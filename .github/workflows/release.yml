name: Publish single package to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Typecheck CLI
        run: pnpm --filter @droppjs/cli typecheck

      - name: Validate standalone CLI package
        run: |
          cd packages/cli
          npm pack --dry-run

      - name: Verify npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}
        run: |
          npm whoami
          npm ping

      - name: Publish package (@droppjs/cli) with retry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}
        run: |
          cd packages/cli
          for i in 1 2 3 4 5; do
            echo "Publish attempt $i"
            npm publish --access public --provenance && exit 0
            if [ "$i" -lt 5 ]; then
              sleep $((i * 15))
            fi
          done
          echo "Publish failed after retries. If error is 429, rotate NPM_KEY or wait for rate limit reset."
          exit 1
