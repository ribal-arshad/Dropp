name: Build and Publish DroppJS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-droppjs-cli
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}
      NPM_CONFIG_ALWAYS_AUTH: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: "@droppjs"
          always-auth: true
          cache: pnpm

      - name: Configure npm authentication for all steps
        run: |
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "Using npm config: ${NPMRC_PATH}"
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > "${NPMRC_PATH}"
          echo "always-auth=true" >> "${NPMRC_PATH}"
          echo "@droppjs:registry=https://registry.npmjs.org/" >> "${NPMRC_PATH}"

      - name: Verify npm auth
        run: npm whoami

      - name: Fetch dependencies (with retry)
        run: |
          ATTEMPTS=4
          for attempt in $(seq 1 "$ATTEMPTS"); do
            echo "Dependency fetch attempt ${attempt}/${ATTEMPTS}"

            set +e
            OUTPUT=$(pnpm fetch --frozen-lockfile 2>&1)
            STATUS=$?
            set -e

            echo "$OUTPUT"

            if [ "$STATUS" -eq 0 ]; then
              echo "Dependency fetch succeeded."
              exit 0
            fi

            if echo "$OUTPUT" | grep -Eqi "E429|429 Too Many Requests|EAI_AGAIN|ETIMEDOUT|ECONNRESET|5[0-9]{2}"; then
              if [ "$attempt" -lt "$ATTEMPTS" ]; then
                BASE=$((30 * (2 ** (attempt - 1))))
                EXTRA=$((RANDOM % 20))
                WAIT=$((BASE + EXTRA))
                echo "Transient registry error while fetching deps. Retrying in ${WAIT}s..."
                sleep "$WAIT"
                continue
              fi
            fi

            echo "Dependency fetch failed with a non-retriable error."
            exit "$STATUS"
          done

      - name: Install dependencies (offline)
        run: pnpm install --frozen-lockfile --offline

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Typecheck CLI
        run: pnpm --filter @droppjs/cli typecheck

      - name: Validate standalone CLI package
        run: |
          cd packages/cli

          # Run prepack once explicitly, then collect clean JSON pack metadata.
          pnpm run prepack
          PACK_META=$(npm pack --json --dry-run --ignore-scripts)
          echo "$PACK_META"

          FILE_COUNT=$(echo "$PACK_META" | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); const x=Array.isArray(d)?d[0]:d; console.log(x.entryCount ?? 0)")
          PACKED_SIZE_BYTES=$(echo "$PACK_META" | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); const x=Array.isArray(d)?d[0]:d; console.log(x.size ?? 0)")
          UNPACKED_SIZE_BYTES=$(echo "$PACK_META" | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); const x=Array.isArray(d)?d[0]:d; console.log(x.unpackedSize ?? 0)")

          echo "CLI pack stats: files=${FILE_COUNT}, packed=${PACKED_SIZE_BYTES}B, unpacked=${UNPACKED_SIZE_BYTES}B"

          # Guardrails: keep the publish payload reasonable to reduce registry stress.
          # Thresholds: <= 20MB packed and <= 5000 files.
          if [ "$PACKED_SIZE_BYTES" -gt 20971520 ]; then
            echo "Pack size too large (${PACKED_SIZE_BYTES} bytes > 20MB)."
            exit 1
          fi

          if [ "$FILE_COUNT" -gt 5000 ]; then
            echo "Package has too many files (${FILE_COUNT} > 5000)."
            exit 1
          fi

      - name: Publish @droppjs/cli
        id: publish_cli
        run: |
          cd packages/cli

          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME="@droppjs/cli"

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published. Skipping."
            echo "status=already-published" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Small jitter to avoid synchronized publish bursts.
          JITTER=$((RANDOM % 45 + 15))
          echo "Initial jitter: ${JITTER}s"
          sleep "$JITTER"

          # Pack once so retries do not rerun prepack and reduce repeated work.
          TARBALL=$(npm pack --silent | tail -n 1)
          echo "Prepared tarball: ${TARBALL}"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

          set +e
          OUTPUT=$(npm publish "${TARBALL}" --access public --provenance --ignore-scripts 2>&1)
          STATUS=$?
          set -e

          echo "$OUTPUT"

          if [ "$STATUS" -eq 0 ]; then
            echo "Publish succeeded."
            echo "status=published" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$OUTPUT" | grep -Eqi "E429|429 Too Many Requests"; then
            echo "npm is actively throttling this package/account."
            echo "Marking workflow as successful and uploading release artifact for manual publish fallback."

            printf '{\n  "package": "%s",\n  "version": "%s",\n  "tarball": "%s",\n  "status": "throttled",\n  "reason": "npm_429_rate_limit"\n}\n' \
              "$PACKAGE_NAME" "$VERSION" "$TARBALL" > publish-result.json

            echo "status=throttled" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Publish failed with a non-retriable error."
          echo "status=failed" >> "$GITHUB_OUTPUT"
          exit "$STATUS"

      - name: Upload release artifact (npm throttled)
        if: steps.publish_cli.outputs.status == 'throttled'
        uses: actions/upload-artifact@v7
        with:
          name: droppjs-cli-${{ github.run_id }}-throttled
          path: |
            packages/cli/${{ steps.publish_cli.outputs.tarball }}
            packages/cli/publish-result.json
            packages/cli/package.json
          if-no-files-found: error
          retention-days: 14
