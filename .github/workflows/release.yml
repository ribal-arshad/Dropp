name: Build and Publish DroppJS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-droppjs-cli
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_KEY }}
      NPM_CONFIG_ALWAYS_AUTH: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: "@droppjs"
          always-auth: true
          cache: pnpm

      - name: Configure npm authentication for all steps
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
          echo "@droppjs:registry=https://registry.npmjs.org/" >> ~/.npmrc

      - name: Verify npm auth
        run: npm whoami

      - name: Fetch dependencies (with retry)
        run: |
          ATTEMPTS=4
          for attempt in $(seq 1 "$ATTEMPTS"); do
            echo "Dependency fetch attempt ${attempt}/${ATTEMPTS}"

            set +e
            OUTPUT=$(pnpm fetch --frozen-lockfile 2>&1)
            STATUS=$?
            set -e

            echo "$OUTPUT"

            if [ "$STATUS" -eq 0 ]; then
              echo "Dependency fetch succeeded."
              exit 0
            fi

            if echo "$OUTPUT" | grep -Eqi "E429|429 Too Many Requests|EAI_AGAIN|ETIMEDOUT|ECONNRESET|5[0-9]{2}"; then
              if [ "$attempt" -lt "$ATTEMPTS" ]; then
                BASE=$((30 * (2 ** (attempt - 1))))
                EXTRA=$((RANDOM % 20))
                WAIT=$((BASE + EXTRA))
                echo "Transient registry error while fetching deps. Retrying in ${WAIT}s..."
                sleep "$WAIT"
                continue
              fi
            fi

            echo "Dependency fetch failed with a non-retriable error."
            exit "$STATUS"
          done

      - name: Install dependencies (offline)
        run: pnpm install --frozen-lockfile --offline

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Typecheck CLI
        run: pnpm --filter @droppjs/cli typecheck

      - name: Validate standalone CLI package
        run: |
          cd packages/cli
          npm pack --dry-run

      - name: Publish @droppjs/cli
        run: |
          cd packages/cli

          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME="@droppjs/cli"

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published. Skipping."
            exit 0
          fi

          # Small jitter to avoid synchronized publish bursts.
          JITTER=$((RANDOM % 45 + 15))
          echo "Initial jitter: ${JITTER}s"
          sleep "$JITTER"

          ATTEMPTS=4
          for attempt in $(seq 1 "$ATTEMPTS"); do
            echo "Publish attempt ${attempt}/${ATTEMPTS}"

            set +e
            OUTPUT=$(npm publish --access public --provenance 2>&1)
            STATUS=$?
            set -e

            echo "$OUTPUT"

            if [ "$STATUS" -eq 0 ]; then
              echo "Publish succeeded."
              exit 0
            fi

            if echo "$OUTPUT" | grep -Eqi "E429|429 Too Many Requests|EAI_AGAIN|ETIMEDOUT|ECONNRESET|5[0-9]{2}"; then
              if [ "$attempt" -lt "$ATTEMPTS" ]; then
                # Exponential backoff with jitter: 1m, 2m, 4m (+0-30s)
                BASE=$((60 * (2 ** (attempt - 1))))
                EXTRA=$((RANDOM % 30))
                WAIT=$((BASE + EXTRA))
                echo "Transient npm error detected. Retrying in ${WAIT}s..."
                sleep "$WAIT"
                continue
              fi
            fi

            echo "Publish failed with a non-retriable error."
            exit "$STATUS"
          done

          echo "Publish failed after ${ATTEMPTS} attempts due to repeated npm throttling/transient errors."
          exit 1
